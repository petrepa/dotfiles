# Alacritty configuration — petrepa/dotfiles  (base, cross-platform)
#
# This file is self-contained and works as-is on macOS and Linux, where it is
# symlinked to ~/.config/alacritty/alacritty.toml and Alacritty uses your login
# shell (zsh).
#
# On Windows there is NO shell here on purpose — install.sh deploys this file to
# %APPDATA%\alacritty\alacritty.toml with shell.windows.toml appended, which adds
# the `wsl.exe -> zsh` launcher.
#
# Schema targets Alacritty 0.13+ (tested on 0.17).

[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
# Reasonable, non-maximized window. `dimensions` is in cells (cols x lines).
dimensions = { columns = 110, lines = 32 }
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 0.97
decorations = "Full"
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true
# Alacritty has no built-in "center" option. On Windows, AutoHotKey/niceToHaves.ahk
# centers the window on launch. On macOS/Linux, leave placement to the window
# manager (or use a WM rule).

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.0
normal = { family = "CaskaydiaCove Nerd Font Mono", style = "Regular" }
bold = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold" }
italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Italic" }
bold_italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold Italic" }

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

[keyboard]
bindings = [
    # New Alacritty window (on Windows: a fresh WSL -> zsh -> zellij session).
    # Alacritty handles this itself, so it works even with zellij running inside.
    { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]

[selection]
save_to_clipboard = true

# Catppuccin Mocha
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"
